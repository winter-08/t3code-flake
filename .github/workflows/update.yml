name: update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      changed: ${{ steps.bump.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run updater
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          out=$(./scripts/update.sh)
          if [[ -n "$out" ]]; then
            echo "changed=true" >>"$GITHUB_OUTPUT"
            echo "version=$out" >>"$GITHUB_OUTPUT"
          else
            echo "changed=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Upload updated sources
        if: steps.bump.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources.json

  verify-linux:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/download-artifact@v4
        with: { name: sources }
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build x86_64-linux package
        run: nix build --print-build-logs .#t3code

  verify-darwin:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/download-artifact@v4
        with: { name: sources }
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build aarch64-darwin package
        run: nix build --print-build-logs .#t3code

  merge:
    needs: [update, verify-linux, verify-darwin]
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with: { name: sources }
      - name: Commit and push to main
        env:
          VERSION: ${{ needs.update.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- sources.json; then
            echo "no changes to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.json
          git commit -m "t3code: bump to v${VERSION}"
          git push origin main
